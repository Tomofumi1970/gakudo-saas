<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学童SaaS 管理コンソール (STG)</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; margin: 0; background: #f5f6f8; color: #1f2328; }
    header { background: #2c5f7d; color: white; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header .user-info { font-size: 0.85rem; opacity: 0.9; }
    main { max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
    nav.tabs { display: flex; gap: 0.25rem; border-bottom: 2px solid #d0d7de; margin-bottom: 1rem; flex-wrap: wrap; }
    nav.tabs button { background: none; border: none; padding: 0.6rem 1rem; cursor: pointer; font-size: 0.9rem; color: #57606a; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    nav.tabs button.active { color: #2c5f7d; border-bottom-color: #2c5f7d; font-weight: 600; }
    section.panel { background: white; padding: 1.5rem; border-radius: 6px; border: 1px solid #d0d7de; }
    h2 { margin-top: 0; font-size: 1.1rem; color: #2c5f7d; }
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #eaeef2; }
    th { background: #f6f8fa; font-weight: 600; color: #57606a; }
    label { display: block; font-size: 0.85rem; color: #57606a; margin: 0.5rem 0 0.25rem; }
    input, select, textarea { width: 100%; padding: 0.5rem; border: 1px solid #d0d7de; border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
    button.primary { background: #2c5f7d; color: white; border: none; padding: 0.55rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    button.primary:hover { background: #234d66; }
    button.ghost { background: white; color: #2c5f7d; border: 1px solid #d0d7de; padding: 0.55rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; background: #ddf4ff; color: #0969da; }
    .badge.paid { background: #dafbe1; color: #1a7f37; }
    .badge.draft { background: #fff8c5; color: #9a6700; }
    .badge.issued { background: #ddf4ff; color: #0969da; }
    .login-box { max-width: 400px; margin: 5rem auto; background: white; padding: 2rem; border-radius: 8px; border: 1px solid #d0d7de; }
    .login-box h2 { text-align: center; margin-bottom: 1.5rem; }
    .error { color: #cf222e; font-size: 0.85rem; margin-top: 0.5rem; }
    .info { color: #0969da; font-size: 0.85rem; margin-top: 0.5rem; }
    .empty { color: #57606a; font-style: italic; padding: 1rem; text-align: center; }
    pre.json { background: #f6f8fa; padding: 0.75rem; border-radius: 4px; font-size: 0.8rem; overflow-x: auto; max-height: 300px; }
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #c9d1d9; }
      section.panel, .login-box { background: #161b22; border-color: #30363d; }
      th { background: #21262d; color: #8b949e; }
      th, td { border-color: #30363d; }
      input, select, textarea { background: #0d1117; color: #c9d1d9; border-color: #30363d; }
      pre.json { background: #0d1117; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
